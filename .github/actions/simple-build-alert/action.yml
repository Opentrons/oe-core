name: 'Simple Build Alert'
description: 'Posts Flex build status to a Slack Workflow webhook with artifact links'

inputs:
  status:
    description: 'Alert status: deployed (artifacts published), failure, or cancelled'
    required: true
  workflow_name:
    description: 'Name of the workflow (reserved for future message formatting)'
    required: true
  webhook_url:
    description: 'Slack Workflow trigger webhook URL (not an Incoming Webhook URL)'
    required: true
  console_url:
    description: 'S3 console URL (optional)'
    required: false
  system_url:
    description: 'System update zip URL (optional)'
    required: false
  fullimage_url:
    description: 'Full image tar URL (optional)'
    required: false
  version_file_url:
    description: 'Version file URL (optional)'
    required: false
  release_notes_file_url:
    description: 'Release notes file URL (optional)'
    required: false
  oe-core_ref:
    description: 'oe-core ref (optional)'
    required: false
  monorepo_ref:
    description: 'Monorepo ref (optional)'
    required: false
  firmware_ref:
    description: 'Firmware ref (optional)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: 'Build Slack payload'
      id: payload
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_STATUS: ${{ inputs.status }}
        INPUT_CONSOLE_URL: ${{ inputs.console_url }}
        INPUT_SYSTEM_URL: ${{ inputs.system_url }}
        INPUT_FULLIMAGE_URL: ${{ inputs.fullimage_url }}
        INPUT_VERSION_FILE_URL: ${{ inputs.version_file_url }}
        INPUT_RELEASE_NOTES_FILE_URL: ${{ inputs.release_notes_file_url }}
        INPUT_OE_CORE_REF: ${{ inputs.oe-core_ref }}
        INPUT_MONOREPO_REF: ${{ inputs.monorepo_ref }}
        INPUT_FIRMWARE_REF: ${{ inputs.firmware_ref }}
      run: |
        payload_json=$(python3 build_payload.py)
        {
          echo "json<<EOF"
          echo "$payload_json"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: 'Send Slack Alert'
      uses: slackapi/slack-github-action@d09f6a279ff492756a31df59952ee6dce8c9b772 # v1.14.0
      with:
        payload: ${{ steps.payload.outputs.json }}
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.webhook_url }}
      continue-on-error: true
