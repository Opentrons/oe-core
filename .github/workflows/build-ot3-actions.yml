name: "Build Flex image on github workflows"
run-name: "image: mono ${{ inputs.monorepo-ref }}, core ${{ inputs.oe-core-ref }}, fw ${{ inputs.ot3-firmware-ref }}"
on:
  workflow_dispatch:
    inputs:
      monorepo-ref:
        description: |
          Ref of https://github.com/opentrons/opentrons to build. ONLY use a tag ref if you are trying to actually release!!! This MUST be a full ref, e.g. refs/heads/edge or refs/tags/v7.5.0-alpha.1 or '-' to indicate not-specified. If not specified, will be determined from the oe-core ref if specified, and then default to edge.
        required: true
        default: "-"
      oe-core-ref:
        description: |
          Ref of https://github.com/opentrons/oe-core to build. This is different from the ref specified in the github api/webUI when starting this workflow - that ref is what contains this workflow, this ref specifies what gets built. ONLY use a tag ref if you are trying to actually release!!! It MUST be a full ref, e.g. refs/heads/main or refs/tags/v0.6.4 or '-' to indicate not-specified. If not specified, will be decided based on the monorepo ref; if that isn't specified, will be main.
        required: true
        default: "-"
      ot3-firmware-ref:
        description: |
          Ref of https://github.com/opentrons/ot3-firmware to build. ONLY use a tag ref if you are trying to actually release!!! It MUST be a full ref, e.g. refs/heads/main or refs/tags/v52 or '-' to indicate not-specified. If not specified, will be decided based on the monorepo ref; if that isn't specified, will be main.
        required: false
        default: "-"
      infra-stage:
        description: |
          What infra stage to run on. This should almost always be prod; dev is useful when you explicitly want to test or prod is busy.
        required: true
        type: choice
        options:
          - "stage-prod"
          - "stage-dev"
        default: "stage-prod"
      runner-request-max-attempts:
        description: |
          Maximum number of retries when requesting an ephemeral runner after 429 capacity responses.
        required: false
        default: 120
        type: number
      runner-request-retry-seconds:
        description: |
          Seconds to wait between ephemeral runner request retries on 429 capacity responses.
        required: false
        default: 60
        type: number

jobs:
  lint-bitbake:
    runs-on: "ubuntu-latest"
    name: "Lint BitBake recipes"
    steps:
      - name: Checkout oe-core
        uses: actions/checkout@v3
        with:
          submodules: false
          fetch-depth: 1
      - name: Install oelint-adv
        run: pip install oelint-adv==9.5.1
      - name: Run BitBake linting
        id: lint
        env:
          OELINT_CONFIG: ${{ github.workspace }}/.oelint.cfg
        run: |
          echo "## BitBake Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Verify config file exists
          if [ -f "$OELINT_CONFIG" ]; then
            echo "Using config: $OELINT_CONFIG"
          else
            echo "Warning: Config file not found at $OELINT_CONFIG"
          fi

          # Avoid linting 3rd party layers
          bb_files=$(find layers/meta-opentrons -type f \( -name "*.bb" -o -name "*.bbappend" -o -name "*.bbclass" -o -name "*.inc" \))
          conf_files=$(find layers/meta-opentrons conf -type f -name "*.conf")

          set +e
          lint_output=$(timeout 120 oelint-adv --quiet --relpaths $bb_files $conf_files 2>&1)
          lint_exit_code=$?
          set -e

          if [ $lint_exit_code -eq 0 ]; then
            echo "No linting issues found." >> $GITHUB_STEP_SUMMARY
            echo "No linting issues found."
          else
            echo "Linting issues found:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$lint_output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            echo "$lint_output"
            exit 1
          fi

  decide-refs:
    runs-on: "ubuntu-latest"
    outputs:
      oe-core: ${{ steps.build-refs.outputs.oe-core }}
      monorepo: ${{ steps.build-refs.outputs.monorepo }}
      ot3-firmware: ${{ steps.build-refs.outputs.ot3-firmware }}
      variant: ${{ steps.build-refs.outputs.variant }}
      build-type: ${{ steps.build-refs.outputs.build-type }}
    name: "deciding refs to build"
    steps:
      - name: Fetch initial sources for action
        uses: actions/checkout@v3
        with:
          submodules: false
          path: ./oe-core-for-workflow
      - name: Decide refs to build
        id: build-refs
        uses: ./oe-core-for-workflow/.github/actions/build-refs
        with:
          token: ${{ github.token }}
          monorepo: ${{ inputs.monorepo-ref }}
          oe-core: ${{ inputs.oe-core-ref }}
          ot3-firmware: ${{ inputs.ot3-firmware-ref }}
      - name: Add refs to the summary
        run: |
          echo "### Decide refs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **oe-core** | ${{ steps.build-refs.outputs.oe-core }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **monorepo** | ${{ steps.build-refs.outputs.monorepo }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **ot3-firmware** | ${{ steps.build-refs.outputs.ot3-firmware }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **variant** | ${{ steps.build-refs.outputs.variant }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **build type** | ${{ steps.build-refs.outputs.build-type }} |" >> $GITHUB_STEP_SUMMARY
  request-ephemeral-runner:
    name: request ephemeral runner
    needs: [decide-refs, lint-bitbake]
    runs-on: ubuntu-latest
    outputs:
      runner_label: ${{ steps.req.outputs.runner_label }}
    steps:
      - id: req
        env:
          # Set these repo secrets:
          # - EPHEMERAL_RUNNER_API_URL_PROD
          # - EPHEMERAL_RUNNER_API_URL_DEV
          API_URL: ${{ inputs.infra-stage == 'stage-dev' && secrets.EPHEMERAL_RUNNER_API_URL_DEV || secrets.EPHEMERAL_RUNNER_API_URL_PROD }}
          INFRA_STAGE: ${{ inputs.infra-stage }}
          VARIANT: ${{ needs.decide-refs.outputs.variant }}
          RUNNER_LABEL: ephemeral-${{ github.run_id }}-${{ github.run_attempt }}
          MAX_ATTEMPTS: ${{ inputs.runner-request-max-attempts }}
          RETRY_SECONDS: ${{ inputs.runner-request-retry-seconds }}
          MISSING_SECRET_MESSAGE: Missing EPHEMERAL_RUNNER_API_URL_* secret for infra-stage=${{ inputs.infra-stage }}
        shell: python
        run: |
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          api_url = os.environ.get("API_URL", "").strip()
          if not api_url:
              print(os.environ.get("MISSING_SECRET_MESSAGE", "Missing runner API URL secret"), file=sys.stderr)
              raise SystemExit(1)

          infra_stage = os.environ["INFRA_STAGE"]
          variant = os.environ["VARIANT"]
          runner_label = os.environ["RUNNER_LABEL"]
          max_attempts = int(os.environ.get("MAX_ATTEMPTS", "120"))
          retry_seconds = int(os.environ.get("RETRY_SECONDS", "60"))

          # Labels: platform, infra stage, variant, unique runner label, repo name (oe-core)
          labels = ["x64", "linux-x64", "sb-x64", infra_stage, variant, runner_label, "oe-core"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"runner_label={runner_label}\n")

          print(f"Requesting runner with unique label: [{runner_label}]")
          print(f"Requested labels: {json.dumps(labels)}")

          start_epoch = int(time.time())
          retries_on_429 = 0
          final_attempt = 0
          http_code = "n/a"

          payload = json.dumps(
              {
                  "labels": labels,
                  "workflow_run_id": os.environ.get("GITHUB_RUN_ID", ""),
                  "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              }
          ).encode("utf-8")
          request_url = f"{api_url.rstrip('/')}/request-runner"

          def emit_request_summary(status: str) -> None:
              now_epoch = int(time.time())
              elapsed_seconds = now_epoch - start_epoch
              waited_seconds = retries_on_429 * retry_seconds
              with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
                  fh.write("### Runner Request Metrics\n\n")
                  fh.write("| Field | Value |\n")
                  fh.write("|---|---|\n")
                  fh.write(f"| Status | {status} |\n")
                  fh.write(f"| Final HTTP status | {http_code} |\n")
                  fh.write(f"| Attempts used | {final_attempt}/{max_attempts} |\n")
                  fh.write(f"| 429 retries | {retries_on_429} |\n")
                  fh.write(f"| Retry wait seconds | {waited_seconds} |\n")
                  fh.write(f"| Total elapsed seconds | {elapsed_seconds} |\n")
                  fh.write(f"| Runner label | {runner_label} |\n")
                  fh.write(f"| Infra stage | {infra_stage} |\n")
                  fh.write(f"| Variant | {variant} |\n\n")

          requested = False
          for attempt in range(1, max_attempts + 1):
              final_attempt = attempt
              response_body = ""
              req = urllib.request.Request(
                  request_url,
                  data=payload,
                  method="POST",
                  headers={"Content-Type": "application/json"},
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      http_code = str(resp.getcode())
                      response_body = resp.read().decode("utf-8", errors="replace")
              except urllib.error.HTTPError as exc:
                  http_code = str(exc.code)
                  response_body = exc.read().decode("utf-8", errors="replace")
              except Exception as exc:
                  http_code = "request_error"
                  response_body = str(exc)

              if http_code == "200":
                  requested = True
                  break
              if http_code == "429":
                  retries_on_429 += 1
                  print(
                      f"Runner capacity full (429), waiting {retry_seconds}s before retry ({attempt}/{max_attempts})..."
                  )
                  time.sleep(retry_seconds)
                  continue

              emit_request_summary("failed")
              print(f"Runner request failed with HTTP {http_code}", file=sys.stderr)
              if response_body:
                  print(response_body, file=sys.stderr)
              raise SystemExit(1)

          if not requested:
              emit_request_summary("timed_out")
              print(
                  f"Timed out waiting for ephemeral runner capacity after {max_attempts} attempts.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          emit_request_summary("success")
  run-build:
    needs: [decide-refs, request-ephemeral-runner, lint-bitbake]
    permissions:
      contents: read
      id-token: write
    strategy:
      max-parallel: 4
      matrix:
        build_env: ["${{ inputs.infra-stage }}"]
    name: "Building ${{needs.decide-refs.outputs.variant}} images on ${{ matrix.build_env }}"
    timeout-minutes: 480
    runs-on:
      [
        'self-hosted',
        '${{ needs.request-ephemeral-runner.outputs.runner_label }}',
      ]
    # Unique group per run so multiple workflow runs can execute in parallel (each gets its own ephemeral runner).
    concurrency:
      group: build-${{ github.run_id }}-${{ github.run_attempt }}
      cancel-in-progress: false
    outputs:
      system_url: ${{ steps.upload-results.outputs.system_url }}
      fullimage_url: ${{ steps.upload-results.outputs.fullimage_url }}
      console_url: ${{ steps.upload-results.outputs.console_url }}
      version_file_url: ${{ steps.upload-results.outputs.version_file_url }}
      release_notes_file_url: ${{ steps.upload-results.outputs.release_notes_file_url }}
    steps:
      - name: Fetch initial sources for action
        uses: actions/checkout@v3
        with:
          submodules: false
          fetch-depth: 0
          path: ./oe-core-for-workflow
      - name: Fetch oe-core source
        uses: actions/checkout@v3
        with:
          submodules: false
          fetch-depth: 0
          ref: ${{needs.decide-refs.outputs.oe-core}}
          path: ./oe-core
      - name: Fetch monorepo source
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ needs.decide-refs.outputs.monorepo }}
          repository: Opentrons/opentrons
          path: ./opentrons
      - name: Fetch ot3-firmware source
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ needs.decide-refs.outputs.ot3-firmware }}
          repository: Opentrons/ot3-firmware
          path: ./ot3-firmware
      - name: Sync oe-core submodules
        run: |
          chown -R `whoami` oe-core
          chown -R `whoami` opentrons
          chown -R `whoami` ot3-firmware
          cd oe-core
          ./update.sh
          cd ..
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ matrix.build_env == 'stage-dev' && vars.ROBOT_STACK_AWS_OIDC_ROLE_ARN_DEV || vars.ROBOT_STACK_AWS_OIDC_ROLE_ARN_PROD }}
          aws-region: us-east-2
          role-duration-seconds: 43200
      - name: Apply CI runner customizations
        run: |
          # Ephemeral runners may not permit writing /etc/sysctl*; apply runtime settings only.
          apply_sysctl() {
            local key="$1"
            local value="$2"
            sudo sysctl -w "${key}=${value}" 2>/dev/null || sysctl -w "${key}=${value}" || true
          }

          apply_sysctl fs.inotify.max_user_watches 655360
          apply_sysctl fs.inotify.max_user_instances 1280
          apply_sysctl fs.file-max 100000

          sudo mount -o remount,exec /tmp 2>/dev/null || true
          sudo mount | grep tmp || true
      - name: Build container
        run: |
          cd oe-core
          tmp_dir=$(mktemp -d -t ci-XXXXXXX)
          cp start.sh $tmp_dir/
          docker build -f ./Dockerfile --tag "ot3-image:latest" $tmp_dir
          cd ..
      - name: Apply unconditional CI config overrides
        run: |
          cd oe-core
          echo "" >> ./conf/local.conf
          echo 'DL_DIR = "/volumes/cache/downloads"' >> ./conf/local.conf
          echo 'GITDIR = "/volumes/cache/git"' >> ./conf/local.conf
          echo 'SSTATE_DIR = "/volumes/cache/sstate"' >> ./conf/local.conf
          echo 'OT_BUILD_TYPE = "${{needs.decide-refs.outputs.build-type}}"' >> ./conf/local.conf
          echo 'YARN_CACHE_DIR = "/volumes/cache/yarn"' >> ./conf/local.conf
          echo 'ELECTRON_CACHE_DIR = "/volumes/cache/electron"' >> ./conf/local.conf
          echo 'CONNECTIVITY_CHECK_URIS = "https://www.yoctoproject.org/connectivity.html"' >> ./conf/local.conf
          echo 'OT_BUILD_TARGET = "odd"' >> ./conf/local.conf
          echo 'OT_SENTRY_AUTH_TOKEN = "${{ secrets.OT_SENTRY_AUTH_TOKEN_OE_CORE }}"' >> ./conf/local.conf
          echo 'OT_SENTRY_DSN = "${{ secrets.OT_ODD_SENTRY_DSN }}"' >> ./conf/local.conf
          cd ..
      - name: Apply internal-release variant CI config overrides
        if: needs.decide-refs.outputs.variant == 'internal-release'
        run: |
          cd oe-core
          echo 'OPENTRONS_PROJECT = "ot3"' >> ./conf/local.conf
          cd ..
      - name: Apply release variant CI config overrides
        if: needs.decide-refs.outputs.variant == 'release'
        run: |
          cd oe-core
          echo 'OPENTRONS_PROJECT = "robot-stack"' >> ./conf/local.conf
          cd ..
      - name: Apply release-build-only CI config overrides
        if: needs.decide-refs.outputs.build-type == 'release'
        run: |
          cd oe-core
          echo 'MIXPANEL_ID = "${{ secrets.MIXPANEL_ID }}"' >> ./conf/local.conf
          # setup signing key
          echo 'SIGNING_KEY = "${TOPDIR}/.signing-key"' >> ./conf/local.conf
          mkdir -p ./build
          cat <<EOF >./build/.signing-key
          ${{secrets.ROBOT_SIGNING_KEY}}
          EOF
          cd ..

      - name: Pull S3 cache
        shell: bash
        run: |
          # fetch cache if the size is less than 20GB, so we have enough space to build image.
          sizeInBytes=`aws s3 ls s3://${S3_CACHE_ARN/arn:aws:s3:::/} --recursive --summarize | awk END'{print}' | grep -o [0-9].*`
          sizeInGigabytes=$(($sizeInBytes/1024/1024/1024))
          if [[ $sizeInGigabytes -gt 50 ]]; then
              echo "Doing clean build without cache, size of cache: ${sizeInGigabytes}GB!"
          else
              aws_cp="aws s3 cp --no-progress"
              cachedir=${LOCAL_CACHE:-./cache}
              s3_prefix="s3://${S3_CACHE_ARN/arn:aws:s3:::/}"
              for cachetype in downloads sstate git ; do
                  localzip="${cachedir}/../${cachetype}.zip"
                  thiscache=${cachedir}/${cachetype}
                  echo "Fetching cache for ${cachetype} to ${localzip}"
                  mkdir -p ${thiscache}
                  max_attempts=3
                  attempt=1
                  while true; do
                    if TIME="%E" time $aws_cp ${s3_prefix}/${cachetype}.zip ${localzip} 2>elapsed; then
                      break
                    fi
                    if [[ $attempt -ge $max_attempts ]]; then
                      echo "S3 fetch for ${cachetype} failed after ${max_attempts} attempts, skipping cache for this type"
                      continue 2
                    fi
                    echo "S3 fetch attempt ${attempt} failed, retrying in $((attempt * 15))s..."
                    sleep $((attempt * 15))
                    attempt=$((attempt + 1))
                  done
                  echo "Fetched $(du -h ${localzip} | cut -f 1)B in $(cat elapsed), extracting to ${thiscache}" || true
                  TIME="%E" time unzip -q -u -o ${localzip} -d ${thiscache} 2>elapsed
                  echo "Extracted $(du -h -d 1 $thiscache | tail -n 1 | cut -f 1)B to ${thiscache} in $(cat elapsed)" || true
                  # Remove zip file immediately after extraction to free up space
                  rm -f ${localzip}
                  echo "Removed ${localzip} to free up space"
              done
          fi
      - name: Cleanup before build
        run: |
          cachedir=${LOCAL_CACHE:-./cache}
          echo "Checking disk space before build..."
          df -h ${cachedir} || df -h .
          # Clean up pip cache if it exists and is large
          if [ -d "${cachedir}/pip" ]; then
              pip_size=$(du -sm ${cachedir}/pip 2>/dev/null | cut -f1 || echo "0")
              if [ "$pip_size" -gt 5000 ]; then
                  echo "Pip cache is ${pip_size}MB, cleaning up..."
                  find ${cachedir}/pip -type f -mtime +7 -delete 2>/dev/null || true
                  echo "Cleaned up old pip cache files"
              fi
          fi
          # Clean up old downloads if space is low
          if [ -d "${cachedir}/downloads" ]; then
              available=$(df -m ${cachedir} | tail -1 | awk '{print $4}')
              if [ "$available" -lt 5000 ]; then
                  echo "Low disk space (${available}MB available), cleaning old downloads..."
                  find ${cachedir}/downloads -type f -mtime +30 -delete 2>/dev/null || true
                  echo "Cleaned up old download files"
              fi
          fi
      - name: Download sources
        run: |
          here=$(pwd)
          oe_mount="type=bind,src=$here/oe-core,dst=/volumes/oe-core,consistency=delegated"
          monorepo_mount="type=bind,src=$here/opentrons,dst=/volumes/opentrons,consistency=delegated"
          ot3_firmware_mount="type=bind,src=$here/ot3-firmware,dst=/volumes/ot3-firmware,consistency=delegated"
          cache_mount="type=bind,src=${LOCAL_CACHE:-./cache},dst=/volumes/cache,consistency=delegated"
          tmp_mount="/tmp:rw,exec"
          echo "docker run --rm --mount $oe_mount --mount $monorepo_mount --mount $ot3_firmware_mount --mount $cache_mount --tmpfs $tmp_mount ot3-image:latest opentrons-ot3-image --runall=fetch"
          docker run --rm --mount $oe_mount --mount $monorepo_mount --mount $ot3_firmware_mount --mount $cache_mount --tmpfs $tmp_mount ot3-image:latest opentrons-ot3-image --runall=fetch
      - name: Build image
        run: |
          here=$(pwd)
          oe_mount="type=bind,src=$here/oe-core,dst=/volumes/oe-core,consistency=delegated"
          monorepo_mount="type=bind,src=$here/opentrons,dst=/volumes/opentrons,consistency=delegated"
          ot3_firmware_mount="type=bind,src=$here/ot3-firmware,dst=/volumes/ot3-firmware,consistency=delegated"
          cache_mount="type=bind,src=${LOCAL_CACHE:-./cache},dst=/volumes/cache,consistency=delegated"
          sudo mount -o remount,exec /tmp
          tmp_mount="/tmp:rw,exec"
          echo "docker run --rm --mount $oe_mount --mount $monorepo_mount --mount $ot3_firmware_mount --mount $cache_mount --tmpfs $tmp_mount ot3-image:latest opentrons-ot3-image"
          docker run --rm --mount $oe_mount --mount $monorepo_mount --mount $ot3_firmware_mount --mount $cache_mount --tmpfs $tmp_mount ot3-image:latest opentrons-ot3-image
      - name: Prune images
        if: always()
        run: docker image prune -af
      - name: Push S3 cache
        shell: bash
        continue-on-error: true
        run: |
          aws_cp="aws s3 cp --no-progress"
          cachedir=${LOCAL_CACHE:-./cache}
          for cachetype in downloads sstate git ; do
              df -h
              localzip="${cachedir}/../${cachetype}.zip"
              thiscache=${cachedir}/${cachetype}
              cd ${thiscache}
              echo "Refreshing cache for ${cachetype} from ${thiscache} to ${localzip}"
              TIME="%E" time zip -q -r --filesync --symlinks  ${localzip} ./* 2>elapsed
              echo "Refreshed cache in $(cat elapsed)" || 0
              TIME="%E" time ${aws_cp} ${localzip} s3://${S3_CACHE_ARN/arn:aws:s3:::/}/${cachetype}.zip 2>elapsed
              echo "Uploaded $(du -h $localzip | cut -f 1)B in $(cat elapsed)" || 0
          done
      - name: Gather results
        id: artifacts
        run: |
          _oe_build=$(pwd)/oe-core/build
          echo "found build dir at ${_oe_build}"
          _artifact_root=${_oe_build}/deploy
          _artifact_unversioned_subdir=opentrons
          _artifact_s3=${_artifact_root}/${_artifact_unversioned_subdir}
          _artifact_versioned=${_artifact_root}/opentrons-versioned
          _oe_images=${_oe_build}/deploy/images
          _oe_tmp=${_oe_build}/tmp
          mkdir -p ${_artifact_s3}
          find ${_oe_images} -name "*opentrons-ot3-image-Tezi*" -exec cp {} ${_artifact_s3}/ot3-fullimage.tar \;
          find ${_oe_images} -name "ot3-system.zip" -exec cp {} ${_artifact_s3} \;
          find ${_oe_images} -name "VERSION.json" -exec cp {} ${_artifact_s3} \;
          find ${_oe_images} -name "release-notes.md" -exec cp {} ${_artifact_s3} \;
          tar czf ${_artifact_s3}/buildstats.tar.gz ${_oe_tmp}/buildstats

          mkdir -p ${_artifact_versioned}
          _fulltag="${{needs.decide-refs.outputs.monorepo}}"
          echo "monorepo_shorttag=${_fulltag:10}" >> $GITHUB_OUTPUT
          _vers_suffix=${{needs.decide-refs.outputs.variant == 'release' && '${_fulltag:11}' || '${_fulltag:14}'}}
          _system_zipname="ot3-system-${_vers_suffix}.zip"
          _version_jsonname="VERSION-${_vers_suffix}.json"
          _fullimage_tarname="ot3-fullimage-${_vers_suffix}.tar"
          cp ${_artifact_s3}/ot3-system.zip "${_artifact_versioned}/${_system_zipname}"
          cp ${_artifact_s3}/VERSION.json "${_artifact_versioned}/${_version_jsonname}"
          cp ${_artifact_s3}/ot3-fullimage.tar "${_artifact_versioned}/${_fullimage_tarname}"
          echo "versioned_system_zip=${_artifact_versioned}/${_system_zipname}" >> $GITHUB_OUTPUT
          echo "versioned_version_json=${_artifact_versioned}/${_version_jsonname}" >> $GITHUB_OUTPUT
          echo "versioned_fullimage_tar=${_artifact_versioned}/${_fullimage_tarname}" >> $GITHUB_OUTPUT

          echo "artifact_root=${_artifact_root}" >> $GITHUB_OUTPUT
          echo "artifact_unversioned_subdir=${_artifact_unversioned_subdir}" >> $GITHUB_OUTPUT
          echo "artifact_versioned=${_artifact_versioned}" >> $GITHUB_OUTPUT
      - name: Handle Release
        if: ${{ needs.decide-refs.outputs.build-type == 'release' }}
        shell: bash
        id: "handle-release"
        run: |
          pushd oe-core/scripts
          aws s3 cp --acl=public-read s3://${S3_ARTIFACT_ARN/arn:aws:s3:::/}/ot3-oe/releases.json releases.json
          base_url=https://${S3_ARTIFACT_ARN/arn:aws:s3:::/}/ot3-oe/${{ github.run_id }}
          version_file=${{ steps.artifacts.outputs.artifact_root }}/${{ steps.artifacts.outputs.artifact_unversioned_subdir }}/VERSION.json
          python3 update_releases_file.py --releases-file releases.json --version-file ${version_file} --base-url $base_url
          aws s3 cp --acl=public-read releases.json s3://${S3_ARTIFACT_ARN/arn:aws:s3:::/}/ot3-oe/
          popd
      - name: Upload results to S3
        shell: bash
        id: "upload-results"
        run: |
          pushd ${{ steps.artifacts.outputs.artifact_root }}
          aws s3 cp --acl=public-read --recursive ${{ steps.artifacts.outputs.artifact_unversioned_subdir }} s3://${S3_ARTIFACT_ARN/arn:aws:s3:::/}/ot3-oe/${{ github.run_id }}
          root_url=https://${S3_ARTIFACT_ARN/arn:aws:s3:::/}/ot3-oe/${{ github.run_id }}
          echo "console_url=https://s3.console.aws.amazon.com/s3/buckets/${S3_ARTIFACT_ARN/arn:aws:s3::::/}?prefix=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "version_file_url=$root_url/VERSION.json" >> $GITHUB_OUTPUT
          echo "release_notes_file_url=$root_url/release-notes.md" >> $GITHUB_OUTPUT
          echo "system_url=$root_url/ot3-system.zip" >> $GITHUB_OUTPUT
          echo "fullimage_url=$root_url/ot3-fullimage.tar" >> $GITHUB_OUTPUT
          popd
      - name: Upload system zip to monorepo release
        if: needs.decide-refs.outputs.build-type == 'release'
        uses: ncipollo/release-action@v1.12.0
        with:
          allowUpdates: true
          omitBody: true
          omitName: true
          omitPrereleaseDuringUpdate: true
          omitDraftDuringUpdate: true
          repo: opentrons
          tag: ${{ steps.artifacts.outputs.monorepo_shorttag }}
          artifacts: ${{ steps.artifacts.outputs.versioned_system_zip }}
          artifactContentType: application/zip
          token: ${{secrets.MONOREPO_RELEASE_ARTIFACT_UPLOAD_TOKEN}}
      - name: Upload fullimage tar to monorepo release
        if: needs.decide-refs.outputs.build-type == 'release'
        uses: ncipollo/release-action@v1.12.0
        with:
          allowUpdates: true
          omitBody: true
          omitName: true
          omitPrereleaseDuringUpdate: true
          omitDraftDuringUpdate: true
          repo: opentrons
          tag: ${{ steps.artifacts.outputs.monorepo_shorttag }}
          artifacts: ${{ steps.artifacts.outputs.versioned_fullimage_tar }}
          artifactContentType: application/x-tar
          token: ${{secrets.MONOREPO_RELEASE_ARTIFACT_UPLOAD_TOKEN}}
      - name: Upload version json to monorepo release
        if: needs.decide-refs.outputs.build-type == 'release'
        uses: ncipollo/release-action@v1.12.0
        with:
          allowUpdates: true
          omitBody: true
          omitName: true
          omitPrereleaseDuringUpdate: true
          omitDraftDuringUpdate: true
          repo: opentrons
          tag: ${{ steps.artifacts.outputs.monorepo_shorttag }}
          artifacts: ${{ steps.artifacts.outputs.versioned_version_json }}
          artifactContentType: application/json
          token: ${{secrets.MONOREPO_RELEASE_ARTIFACT_UPLOAD_TOKEN}}
      # Ephemeral runners are destroyed after the job; cleanup is redundant but harmless.
      - name: Remove build data
        if: always()
        continue-on-error: true
        run: |
          rm -rf ./*
      - name: Remove poisoned cache
        if: ${{ failure() }}
        run: |
          rm -rf ${LOCAL_CACHE:-./cache}/*
  notify-tagged-success:
    name: "Notify Tagged Build Success"
    runs-on: "ubuntu-latest"
    needs: [decide-refs, run-build]
    if: always() && github.event_name == 'workflow_dispatch' && startsWith(needs.decide-refs.outputs.monorepo, 'refs/tags/') && needs.run-build.result == 'success' && needs.decide-refs.outputs.variant != ''
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: "Send success alert"
        uses: ./.github/actions/simple-build-alert
        continue-on-error: true
        with:
          status: "success"
          workflow_name: "Build Flex image on github workflows"
          webhook_url: ${{ vars.SLACK_WEBHOOK_URL_TAGGED }}
          console_url: ${{ needs.run-build.outputs.console_url }}
          system_url: ${{ needs.run-build.outputs.system_url }}
          fullimage_url: ${{ needs.run-build.outputs.fullimage_url }}
          version_file_url: ${{ needs.run-build.outputs.version_file_url }}
          release_notes_file_url: ${{ needs.run-build.outputs.release_notes_file_url }}
          oe-core_ref: ${{ needs.decide-refs.outputs.oe-core }}
          monorepo_ref: ${{ needs.decide-refs.outputs.monorepo }}
          firmware_ref: ${{ needs.decide-refs.outputs.ot3-firmware }}
