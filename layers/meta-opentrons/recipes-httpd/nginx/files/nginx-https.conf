user root root;
pid /run/nginx/nginx-https.pid;

events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
    
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    
    server {
        listen [::]:32313 ssl;
        listen 0.0.0.0:32313 ssl;

        client_body_in_file_only off;
        client_body_buffer_size  128k;
        client_max_body_size     2M;

        access_log /var/log/access-https.log combined;
        error_log stderr;

        keepalive_timeout   70;

        ssl_certificate     /var/lib/opentrons-key-server/tls/ot-robot-tls-cert.crt;
        ssl_certificate_key /var/lib/opentrons-key-server/tls/ot-robot-tls-key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # If nginx matches multiple location paths, it uses the one with the
        # longest prefix, so order shouldn't matter but length of path does
        location / {
            proxy_http_version       1.1;
            proxy_set_header         Upgrade $http_upgrade;
            proxy_set_header         Connection $connection_upgrade;
            proxy_read_timeout       1h;
            proxy_pass               http://unix:/run/aiohttp.sock;
        }

        location /server {
            proxy_http_version       1.1;
            proxy_read_timeout       1h;
            proxy_set_header         X-Host-IP $server_addr;
            proxy_pass               http://127.0.0.1:34000;
            proxy_request_buffering  off;
            client_max_body_size     0;
        }

        location /auth {
            proxy_http_version 1.1;
            proxy_read_timeout 1h;
            proxy_pass http://unix:/run/opentrons-auth-server.sock;
        }
    }
}
